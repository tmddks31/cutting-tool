<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>컷팅 도구 v16</title>
<style>
body { font-family: Arial; padding: 20px; background:#111; color:#fff; }
canvas { border: 1px solid #555; width: 100%; max-width: 500px; touch-action: none; }
button, select, input { margin-top: 8px; padding: 6px; }
.control { margin-top:10px; }
</style>
</head>
<body>

<h2>📐 컷팅 도구 v16</h2>

<input type="file" id="imageInput" accept="image/*"><br>

<div class="control">
기준선 색상 <input type="color" id="baseLineColor" value="#00aaff">
기준점 크기 <input type="number" id="basePointSize" value="8">
</div>

<div class="control">
컷팅선 색상 <input type="color" id="cutLineColor" value="#ff4444">
컷팅점 크기 <input type="number" id="cutPointSize" value="10">
</div>

<p id="step">STEP 1: 사진 선택</p>

<canvas id="canvas"></canvas>

<br>
<button onclick="confirmPoint()">점 확정</button>
<button onclick="undo()">되돌리기</button>

<h3>결과</h3>
<div id="output"></div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let img = new Image();

let step = 1;
let scale = 1;

let scalePoints = [];
let points = [];

let tempPoint = null;
let isDragging = false;

document.getElementById("imageInput").addEventListener("change", e=>{
    let file = e.target.files[0];
    let url = URL.createObjectURL(file);

    img.onload = ()=>{
        canvas.width = img.width;
        canvas.height = img.height;
        step = 2;
        scalePoints = [];
        points = [];
        redraw();
        document.getElementById("step").innerText = "STEP 2: 기준점 설정 (드래그 후 확정)";
    };

    img.src = url;
});

function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return {
        x: (e.touches ? e.touches[0].clientX : e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.touches ? e.touches[0].clientY : e.clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", move);
canvas.addEventListener("mouseup", end);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", move);
canvas.addEventListener("touchend", end);

function start(e){
    isDragging = true;
    tempPoint = getPos(e);
    redraw();
}

function move(e){
    if(!isDragging) return;
    tempPoint = getPos(e);
    redraw();
}

function end(){
    isDragging = false;
}

function confirmPoint(){
    if(!tempPoint) return;

    if(step === 2){
        scalePoints.push({...tempPoint});
        if(scalePoints.length === 2){
            let px = dist(scalePoints[0], scalePoints[1]);
            let real = prompt("기준 길이(mm)", "500");
            scale = real / px;

            step = 3;
            document.getElementById("step").innerText = "STEP 3: 컷팅점 설정 (드래그 → 확정)";
        }
    }
    else if(step === 3){
        points.push({...tempPoint});
    }

    tempPoint = null;
    redraw();
}

function undo(){
    if(step === 2 && scalePoints.length > 0){
        scalePoints.pop();
    }
    else if(step === 3 && points.length > 0){
        points.pop();
    }
    redraw();
}

function redraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    let baseColor = document.getElementById("baseLineColor").value;
    let cutColor = document.getElementById("cutLineColor").value;
    let baseSize = document.getElementById("basePointSize").value;
    let cutSize = document.getElementById("cutPointSize").value;

    ctx.lineWidth = 3;
    ctx.font = "20px Arial";

    // 기준선
    ctx.strokeStyle = baseColor;
    ctx.beginPath();
    scalePoints.forEach((p,i)=>{
        drawPoint(p, baseColor, baseSize);
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });
    ctx.stroke();

    // 컷팅선
    ctx.strokeStyle = cutColor;
    ctx.beginPath();
    points.forEach((p,i)=>{
        drawPoint(p, cutColor, cutSize);
        if(i===0) ctx.moveTo(p.x,p.y);
        else{
            ctx.lineTo(p.x,p.y);

            // 치수 표시
            let d = dist(points[i-1], p) * scale;
            ctx.fillStyle="#fff";
            ctx.fillText(d.toFixed(1)+"mm", (p.x+points[i-1].x)/2, (p.y+points[i-1].y)/2);
        }
    });
    ctx.stroke();

    // 임시 점
    if(tempPoint){
        drawPoint(tempPoint, "#00ff00", 12);
    }

    // 결과
    let out="";
    for(let i=1;i<points.length;i++){
        out += `변 ${i}: ${(dist(points[i-1], points[i])*scale).toFixed(1)} mm<br>`;
    }
    document.getElementById("output").innerHTML = out;
}

function drawPoint(p,color,size){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,size,0,Math.PI*2);
    ctx.fill();
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}
</script>

</body>
</html>
