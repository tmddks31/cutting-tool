<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>컷팅 도구 v11</title>
<style>
body { font-family: Arial; padding: 20px; }
canvas { border: 1px solid #000; width: 100%; max-width: 500px; }

button {
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>
<body>

<h2>📐 컷팅 도구 (선 기반 v11)</h2>

<input type="file" id="imageInput" accept="image/*">

<p id="step">STEP 1: 사진 선택</p>

<canvas id="canvas"></canvas>

<br>
<button onclick="undo()">되돌리기</button>
<button onclick="finish()">외곽선 완료</button>

<h3>결과</h3>
<div id="output"></div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let step = 1;
let scale = 1;

let scalePoints = [];
let points = [];
let img = new Image();

// 이미지 로드
document.getElementById("imageInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if (!file) return;

    let url = URL.createObjectURL(file);

    img.onload = function(){
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        step = 2;
        document.getElementById("step").innerText = "STEP 2: 기준선 2점 클릭";
    };

    img.src = url;
});

// 좌표
function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
}

// 클릭 이벤트
canvas.addEventListener("click", function(e){
    let p = getPos(e);

    if(step === 2){
        scalePoints.push(p);
        drawPoint(p);

        if(scalePoints.length === 2){
            let px = dist(scalePoints[0], scalePoints[1]);
            let real = prompt("기준 길이(mm)", "500");

            scale = real / px;
            step = 3;
            document.getElementById("step").innerText = "STEP 3: 선을 따라 클릭";
        }
    }

    else if(step === 3){
        let snapped = snap(points[points.length-1], p);
        points.push(snapped);
        redraw();
    }
});

// 스냅 (직선 보정)
function snap(prev, current){
    if(!prev) return current;

    let dx = Math.abs(current.x - prev.x);
    let dy = Math.abs(current.y - prev.y);

    if(dx < 20) return {x: prev.x, y: current.y}; // 수직
    if(dy < 20) return {x: current.x, y: prev.y}; // 수평

    return current;
}

// 그리기
function redraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    ctx.strokeStyle = "blue";
    ctx.beginPath();

    for(let i=0;i<points.length;i++){
        let p = points[i];
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    }

    ctx.stroke();

    // 치수 계산
    let out = "";
    for(let i=1;i<points.length;i++){
        let mm = dist(points[i-1], points[i]) * scale;
        out += `변 ${i}: ${mm.toFixed(1)} mm<br>`;
    }

    document.getElementById("output").innerHTML = out;
}

// 완료 (자동 닫힘)
function finish(){
    if(points.length > 2){
        points.push(points[0]);
        redraw();
    }
}

// 되돌리기
function undo(){
    points.pop();
    redraw();
}

// 거리
function dist(a,b){
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function drawPoint(p){
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
}
</script>

</body>
</html>
