<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>컷팅 도구 v14</title>
<style>
body { font-family: Arial; padding: 20px; }
canvas { border: 1px solid #000; width: 100%; max-width: 500px; }
button, select { margin-top: 10px; padding: 8px; }
</style>
</head>
<body>

<h2>📐 컷팅 도구 v14</h2>

<input type="file" id="imageInput" accept="image/*">

<br>

선 색상:
<select id="lineColor">
  <option value="blue">파랑</option>
  <option value="red">빨강</option>
  <option value="green">초록</option>
  <option value="yellow">노랑</option>
</select>

점 색상:
<select id="pointColor">
  <option value="yellow">노랑</option>
  <option value="red">빨강</option>
  <option value="white">흰색</option>
</select>

<p id="step">STEP 1: 사진 선택</p>

<canvas id="canvas"></canvas>

<br>
<button onclick="undo()">되돌리기</button>
<button onclick="finish()">외곽선 완료</button>

<h3>결과</h3>
<div id="output"></div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let step = 1;
let scale = 1;

let scalePoints = [];
let points = [];
let img = new Image();

let SNAP_DIST = 25;

document.getElementById("imageInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if (!file) return;

    let url = URL.createObjectURL(file);

    img.onload = function(){
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        step = 2;
        scalePoints = [];
        points = [];

        document.getElementById("step").innerText = "STEP 2: 기준선 2점 클릭";
    };

    img.src = url;
});

function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener("click", function(e){
    let p = getPos(e);

    if(step === 2){
        scalePoints.push(p);
        redraw();

        if(scalePoints.length === 2){
            let px = dist(scalePoints[0], scalePoints[1]);
            let real = prompt("기준 길이(mm)", "500");
            scale = real / px;

            step = 3;
            document.getElementById("step").innerText = "STEP 3: 외곽선 클릭";
        }
    }

    else if(step === 3){
        p = correctPoint(p);

        if(points.length > 2 && dist(points[0], p) < SNAP_DIST){
            finish();
            return;
        }

        let snapped = snap(points[points.length-1], p);
        points.push(snapped);
        redraw();
    }
});

function correctPoint(p){
    for(let pt of points){
        if(dist(pt, p) < SNAP_DIST){
            return pt;
        }
    }
    return p;
}

function snap(prev, current){
    if(!prev) return current;

    let dx = Math.abs(current.x - prev.x);
    let dy = Math.abs(current.y - prev.y);

    if(dx < 20) return {x: prev.x, y: current.y};
    if(dy < 20) return {x: current.x, y: prev.y};

    return current;
}

function redraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    let lineColor = document.getElementById("lineColor").value;
    let pointColor = document.getElementById("pointColor").value;

    ctx.lineWidth = 3;
    ctx.strokeStyle = lineColor;
    ctx.fillStyle = "white";
    ctx.font = "16px Arial"; // 🔥 글씨 키움

    // 🔴 기준선
    if(scalePoints.length > 0){
        for(let p of scalePoints){
            drawPoint(p, "red");
        }

        if(scalePoints.length === 2){
            ctx.beginPath();
            ctx.moveTo(scalePoints[0].x, scalePoints[0].y);
            ctx.lineTo(scalePoints[1].x, scalePoints[1].y);
            ctx.stroke();

            ctx.fillText("기준선", 
                (scalePoints[0].x + scalePoints[1].x)/2,
                (scalePoints[0].y + scalePoints[1].y)/2);
        }
    }

    // 🔵 외곽선
    if(points.length > 0){
        ctx.beginPath();

        for(let i=0;i<points.length;i++){
            let p = points[i];

            if(i===0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);

            drawPoint(p, pointColor);

            if(i > 0){
                let midX = (points[i-1].x + p.x) / 2;
                let midY = (points[i-1].y + p.y) / 2;

                ctx.fillText("변" + i, midX, midY);
            }
        }

        ctx.stroke();
    }

    // 결과
    let out = "";
    for(let i=1;i<points.length;i++){
        let mm = dist(points[i-1], points[i]) * scale;

        if(mm > 5){
            out += `변 ${i}: ${mm.toFixed(1)} (mm)<br>`;
        }
    }

    document.getElementById("output").innerHTML = out;
}

function finish(){
    if(points.length > 2){
        let first = points[0];
        let last = points[points.length - 1];

        if(dist(first, last) > 10){
            points.push(first);
        }

        redraw();
    }
}

function undo(){
    // 🔥 기준선 단계 되돌리기
    if(step === 2 && scalePoints.length > 0){
        scalePoints.pop();
        redraw();
        return;
    }

    // 🔥 외곽선 되돌리기
    if(step === 3 && points.length > 0){
        points.pop();
        redraw();
    }
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function drawPoint(p, color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
    ctx.fill();
}
</script>

</body>
</html>
