<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>컷팅 도구 v12</title>
<style>
body { font-family: Arial; padding: 20px; }
canvas { border: 1px solid #000; width: 100%; max-width: 500px; }
button { margin-top: 10px; padding: 10px; }
</style>
</head>
<body>

<h2>📐 컷팅 도구 v12</h2>

<input type="file" id="imageInput" accept="image/*">
<p id="step">STEP 1: 사진 선택</p>

<canvas id="canvas"></canvas>

<br>
<button onclick="undo()">되돌리기</button>
<button onclick="finish()">외곽선 완료</button>

<h3>결과</h3>
<div id="output"></div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let step = 1;
let scale = 1;

let scalePoints = [];
let points = [];
let img = new Image();

document.getElementById("imageInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if (!file) return;

    let url = URL.createObjectURL(file);

    img.onload = function(){
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        step = 2;
        document.getElementById("step").innerText = "STEP 2: 기준선 2점 클릭";
    };

    img.src = url;
});

function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener("click", function(e){
    let p = getPos(e);

    if(step === 2){
        scalePoints.push(p);
        drawPoint(p, "red");

        if(scalePoints.length === 2){
            let px = dist(scalePoints[0], scalePoints[1]);
            let real = prompt("기준 길이(mm)", "500");
            scale = real / px;

            step = 3;
            document.getElementById("step").innerText = "STEP 3: 외곽선 클릭";
        }
    }

    else if(step === 3){
        // 시작점 근처 클릭 시 자동 종료
        if(points.length > 2 && dist(points[0], p) < 20){
            finish();
            return;
        }

        let snapped = snap(points[points.length-1], p);
        points.push(snapped);
        redraw();
    }
});

function snap(prev, current){
    if(!prev) return current;

    let dx = Math.abs(current.x - prev.x);
    let dy = Math.abs(current.y - prev.y);

    if(dx < 20) return {x: prev.x, y: current.y};
    if(dy < 20) return {x: current.x, y: prev.y};

    return current;
}

function redraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.beginPath();

    for(let i=0;i<points.length;i++){
        let p = points[i];
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);

        drawPoint(p, "yellow");

        // 변 번호 표시
        if(i > 0){
            let midX = (points[i-1].x + p.x) / 2;
            let midY = (points[i-1].y + p.y) / 2;

            ctx.fillStyle = "white";
            ctx.fillText("변" + i, midX, midY);
        }
    }

    ctx.stroke();

    // 기준선 표시
    if(scalePoints.length === 2){
        ctx.strokeStyle = "red";
        ctx.beginPath();
        ctx.moveTo(scalePoints[0].x, scalePoints[0].y);
        ctx.lineTo(scalePoints[1].x, scalePoints[1].y);
        ctx.stroke();

        ctx.fillStyle = "red";
        ctx.fillText("기준선", (scalePoints[0].x + scalePoints[1].x)/2,
                             (scalePoints[0].y + scalePoints[1].y)/2);
    }

    // 결과 출력
    let out = "";
    for(let i=1;i<points.length;i++){
        let mm = dist(points[i-1], points[i]) * scale;

        if(mm > 5){ // 노이즈 제거
            out += `변 ${i}: ${mm.toFixed(1)} (mm)<br>`;
        }
    }

    document.getElementById("output").innerHTML = out;
}

function finish(){
    if(points.length > 2){
        let first = points[0];
        let last = points[points.length - 1];

        if(dist(first, last) > 10){
            points.push(first);
        }

        redraw();
    }
}

function undo(){
    points.pop();
    redraw();
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function drawPoint(p, color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
}
</script>

</body>
</html>
